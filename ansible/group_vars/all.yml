# Non-secret defaults. All secrets loaded via lookup('env', ...) from the shell environment.
# When running via `just`, set dotenv-load + set export ensures .env vars reach ansible.

# Ollama
ollama_host: "0.0.0.0"
ollama_port: 11434
ollama_num_parallel: "{{ lookup('env', 'OLLAMA_NUM_PARALLEL') | default('5') }}"

# Research
research_report_channel: "{{ lookup('env', 'RESEARCH_REPORT_CHANNEL') | default('') }}"

# Optional features
enable_webui: false   # Set true to deploy Open WebUI (+1 GB VM memory)

# Podman machine
podman_machine_name: "hermes-machine"
podman_machine_cpus: 4
podman_machine_memory_mb: "{{ 2048 + (1024 if enable_webui else 0) }}"
podman_machine_disk_gb: 40

# Container image registry
ghcr_owner: "{{ lookup('env', 'GHCR_OWNER') }}"

# Allowed models (comma-separated string from env)
allowed_models: "{{ lookup('env', 'ALLOWED_MODELS') | default('hermes3') }}"

# Discord
discord_token: "{{ lookup('env', 'DISCORD_TOKEN') }}"
discord_channel_id: "{{ lookup('env', 'DISCORD_CHANNEL_ID') }}"

# GitHub
github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('') }}"

# Proxy tuning
rate_limit_burst: "{{ lookup('env', 'RATE_LIMIT_BURST') | default('20') }}"
rate_limit_per_min: "{{ lookup('env', 'RATE_LIMIT_PER_MIN') | default('5') }}"
max_tool_rounds: "{{ lookup('env', 'MAX_TOOL_ROUNDS') | default('10') }}"
tool_timeout_secs: "{{ lookup('env', 'TOOL_TIMEOUT_SECS') | default('120') }}"

# Network
zt_interface: "{{ lookup('env', 'ZT_INTERFACE') }}"
zt_subnet: "{{ lookup('env', 'ZT_SUBNET') }}"
vm_subnet: "{{ lookup('env', 'VM_SUBNET') | default('192.168.127.0/24') }}"
# Podman 5.x applehv uses user-mode networking — no host-side bridge interface.
# vm_bridge_iface is written to the inventory by gen-inventory.sh (always lo0 with applehv).
vm_bridge_iface: "lo0"
