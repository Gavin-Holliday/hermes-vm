---
- name: reload systemd daemon
  ansible.builtin.command: systemctl daemon-reload
  become: true
  notify: restart hermes services

- name: restart hermes services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
  become: true
  loop: "{{ ['hermes-proxy', 'hermes-searxng', 'hermes-discord'] + (['hermes-webui'] if enable_webui else []) }}"
  ignore_errors: true
