---
- name: reload systemd daemon
  ansible.builtin.command: systemctl daemon-reload
  become: true
  notify: restart hermes services

- name: restart hermes services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
  become: true
  loop:
    - hermes-proxy
    - hermes-webui
    - hermes-searxng
    - hermes-discord
  ignore_errors: true
