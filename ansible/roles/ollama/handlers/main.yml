---
- name: reload ollama launchd
  ansible.builtin.command: >
    launchctl unload
    {{ ansible_env.HOME }}/Library/LaunchAgents/com.hermes.ollama.plist
  ignore_errors: true
  notify: load ollama launchd

- name: load ollama launchd
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_env.HOME }}/Library/LaunchAgents/com.hermes.ollama.plist
