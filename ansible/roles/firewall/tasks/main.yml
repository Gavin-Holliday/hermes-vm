---
- name: Ensure /etc/pf.d directory exists
  ansible.builtin.file:
    path: /etc/pf.d
    state: directory
    mode: "0755"
  become: true

# With Podman 5.x user-mode networking there is no host-side bridge interface.
# We restrict Ollama by source subnet (192.168.127.0/24) rather than interface.
# vm_bridge_iface is kept in the template as a no-op placeholder (lo0) so the
# pf rule syntax remains valid; the security is enforced by the from-subnet clause.

- name: Render hermes pf rules
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../host/firewall/hermes.pf.conf.j2"
    dest: /etc/pf.d/hermes.conf
    mode: "0644"
  become: true
  notify: reload pf rules

- name: Load pf rules now
  # -f loads the ruleset; omit -e because pf is always already enabled on macOS
  ansible.builtin.command: pfctl -f /etc/pf.d/hermes.conf
  become: true
  changed_when: true

- name: Deploy pf boot launchd plist
  ansible.builtin.template:
    src: com.hermes.pf.plist.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.hermes.pf.plist"
    mode: "0644"

- name: Load pf launchd plist
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.hermes.pf.plist
  register: pf_load
  changed_when: pf_load.rc == 0
  failed_when: pf_load.rc != 0 and "already loaded" not in pf_load.stderr
