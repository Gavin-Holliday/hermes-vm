---
# Master playbook — runs all hermes-vm roles in dependency order.
# Run via: just setup   (first time)   or   just update   (subsequent runs)

# ── Host roles (run on macOS localhost) ───────────────────────────────────────
- name: Provision macOS host
  hosts: localhost
  gather_facts: true
  roles:
    - role: prerequisites
      tags: prerequisites
    - role: ollama
      tags: ollama
    - role: firewall
      tags: firewall
    - role: podman-machine
      tags: podman-machine

# ── VM roles (run inside hermes-machine via SSH) ──────────────────────────────
- name: Provision hermes-machine VM
  hosts: hermes-machine
  gather_facts: true
  roles:
    - role: vm-quadlets
      tags: vm-quadlets
    - role: vm-volumes
      tags: vm-volumes
    - role: vm-autoupdate
      tags: vm-autoupdate
