name: Implement claude-labeled issues

on:
  issues:
    types: [labeled]

# One run per issue at a time. If a second trigger comes in while one is
# running, it queues rather than running in parallel.
concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    name: Implement fix for issue #${{ github.event.issue.number }}
    # Only run when the label just added is 'claude'
    if: github.event.label.name == 'claude'
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write

    steps:
      - name: Mark issue as in-progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo Gavin-Holliday/hermes-vm \
            --add-label "in-progress" || true

      - name: Implement, commit, and close issue
        id: claude
        working-directory: /Users/gavinholliday/Projects/hermes-vm
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --print --dangerously-skip-permissions \
            "A GitHub issue has been labeled 'claude' and needs to be implemented.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          The repo is at /Users/gavinholliday/Projects/hermes-vm. Investigate the issue, implement the fix, commit, and push. Then close the issue with a comment linking the commit SHA. Use: gh issue comment ${ISSUE_NUMBER} --repo Gavin-Holliday/hermes-vm --body '...' && gh issue close ${ISSUE_NUMBER} --repo Gavin-Holliday/hermes-vm"

      - name: Remove in-progress label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo Gavin-Holliday/hermes-vm \
            --remove-label "in-progress" || true

      - name: Comment on issue with failure details
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo Gavin-Holliday/hermes-vm \
            --body "**Claude was unable to complete this issue automatically.**

          The implementation run failed and needs human input.

          **Run logs:** ${RUN_URL}

          Please review the logs, clarify the issue description, or implement manually. Re-add the \`claude\` label once the issue is updated to retry."

      - name: Notify Discord on failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"⚠️ **Claude needs help with issue #${ISSUE_NUMBER}**\n\n**${ISSUE_TITLE}**\n${ISSUE_URL}\n\nThe automated implementation failed. Check the logs or clarify the issue, then re-add the \`claude\` label to retry.\n\n**Logs:** ${RUN_URL}\"
            }"
