name: Build and push container images

on:
  push:
    branches:
      - main
    paths:
      - "vm/proxy/**"
      - "vm/discord-bot/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-proxy:
    name: Build hermes-proxy
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/hermes-proxy
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push hermes-proxy
        uses: docker/build-push-action@v6
        with:
          context: vm/proxy
          file: vm/proxy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-discord:
    name: Build hermes-discord
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/hermes-discord
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push hermes-discord
        uses: docker/build-push-action@v6
        with:
          context: vm/discord-bot
          file: vm/discord-bot/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to hermes-machine
    needs: [build-proxy, build-discord]
    runs-on: self-hosted
    steps:
      - name: Pull new images and restart containers
        working-directory: /Users/gavinholliday/Projects/hermes-vm
        run: just update-images && just restart

  notify:
    name: Notify Discord of deployment
    needs: [deploy]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Post deployment update
        env:
          DISCORD_WEBHOOK_UPDATES: ${{ secrets.DISCORD_WEBHOOK_UPDATES }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [[ -z "$DISCORD_WEBHOOK_UPDATES" ]] && exit 0
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"

          if [[ "$DEPLOY_STATUS" == "success" ]]; then
            ICON="🚀"
            STATUS_LINE="Deployed successfully"
          else
            ICON="❌"
            STATUS_LINE="Deployment failed"
          fi

          # Escape double quotes in commit message for JSON
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/"/\\"/g')

          curl -s -X POST "$DISCORD_WEBHOOK_UPDATES" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${ICON} hermes-vm ${STATUS_LINE}\",
                \"description\": \"[\`${SHORT_SHA}\`](${COMMIT_URL}) ${SAFE_MSG}\",
                \"color\": $([ "$DEPLOY_STATUS" == "success" ] && echo "3066993" || echo "15158332"),
                \"fields\": [
                  { \"name\": \"Author\", \"value\": \"${COMMIT_AUTHOR}\", \"inline\": true },
                  { \"name\": \"Status\", \"value\": \"${STATUS_LINE}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Run logs\" },
                \"url\": \"${RUN_URL}\"
              }]
            }"
